kind = "web"
previewPath = "/"
title = "Buttler: Bidet Finder"
version = "1.0.0"
id = "artifacts/buttler"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23216
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/buttler run dev"

[services.env]
PORT = "23216"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/buttler", "run", "build"]
publicDir = "artifacts/buttler/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
