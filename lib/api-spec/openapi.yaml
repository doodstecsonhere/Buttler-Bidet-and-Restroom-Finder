openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bidets
    description: Bidet location operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /bidets:
    get:
      operationId: getBidets
      tags: [bidets]
      summary: Get all bidet locations
      description: Returns all bidet locations in Dumaguete
      responses:
        "200":
          description: List of bidet locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BidetLocation"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    BidetLocation:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
      required:
        - id
        - name
        - latitude
        - longitude
