openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: restrooms
    description: Restroom location operations
  - name: audits
    description: Guardian Audit operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /restrooms:
    get:
      operationId: getRestrooms
      tags: [restrooms]
      summary: Get all restroom locations
      description: Returns all restroom locations in Dumaguete
      responses:
        "200":
          description: List of restroom locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RestroomLocation"
  /audits:
    get:
      operationId: getAudits
      tags: [audits]
      summary: Get all restroom audits
      description: Returns all audits grouped by restroom
      responses:
        "200":
          description: Map of restroomId to audit count and audit list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditSummaryMap"
    post:
      operationId: createAudit
      tags: [audits]
      summary: Submit a Guardian Audit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuditBody"
      responses:
        "201":
          description: Audit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditRecord"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RestroomLocation:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        address:
          type: [string, 'null']
        access:
          type: string
        fee:
          type: string
        bidet:
          type: boolean
      required:
        - id
        - name
        - latitude
        - longitude
        - address
        - access
        - fee
        - bidet
    CreateAuditBody:
      type: object
      required: [restroomId, restroomName, latitude, longitude, pwdAccessible, hasSoap, hasToiletSeat, hasTissue, hasFunctionalBidet]
      properties:
        restroomId:
          type: integer
        restroomName:
          type: string
        latitude:
          type: string
        longitude:
          type: string
        pwdAccessible:
          type: boolean
        hasSoap:
          type: boolean
        hasToiletSeat:
          type: boolean
        hasTissue:
          type: boolean
        hasFunctionalBidet:
          type: boolean
        remarks:
          type: [string, 'null']
    AuditRecord:
      type: object
      required: [id, userId, restroomId, restroomName, latitude, longitude, pwdAccessible, hasSoap, hasToiletSeat, hasTissue, hasFunctionalBidet, tierStatus, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        restroomId:
          type: integer
        restroomName:
          type: string
        latitude:
          type: string
        longitude:
          type: string
        pwdAccessible:
          type: boolean
        hasSoap:
          type: boolean
        hasToiletSeat:
          type: boolean
        hasTissue:
          type: boolean
        hasFunctionalBidet:
          type: boolean
        remarks:
          type: [string, 'null']
        tierStatus:
          type: string
        createdAt:
          type: string
          format: date-time
    AuditSummaryMap:
      type: object
      additionalProperties:
        type: object
        required: [count, audits]
        properties:
          count:
            type: integer
          audits:
            type: array
            items:
              $ref: '#/components/schemas/AuditRecord'
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
